name: release-please (reusable)

# Reusable workflow: runs release-please against whichever branch the CALLER was
# triggered on, then back-labels every PR that shipped in a new release.
#
# It carries no `push:` trigger of its own — a reusable workflow can't. The
# consumer repo owns the trigger in a thin caller workflow that does:
#
#   on:
#     push:
#       branches: [main, 'release/**']
#   jobs:
#     release-please:
#       permissions: { contents: write, pull-requests: write }
#       uses: OpenHands/release-actions/.github/workflows/release-please.yml@v1
#
# (This repo calls it via the local `./` path — see .github/workflows/release.yml.)
on:
  workflow_call:
    inputs:
      config-file:
        description: >-
          Path to the release-please config file. Override it when a repo runs
          this workflow more than once — one independent release line per
          artifact (each line needs its own config + manifest pair).
        required: false
        type: string
        default: release-please-config.json
      manifest-file:
        description: >-
          Path to the release-please manifest file. Pair a distinct manifest
          with each config-file so every release line tracks its own version.
        required: false
        type: string
        default: .release-please-manifest.json
      github-scoped-notes:
        description: >-
          Opt-in (default false). When false, releases run through the stock
          googleapis/release-please-action — unchanged behavior. When true, they
          run through the library-mode engine that emits GitHub-style release
          notes scoped per package path (so the release PR body and the published
          Release carry the same `## What's Changed` notes). Packages also opt in
          per line with `"changelog-type": "github-scoped"` in their config; any
          line left on another changelog-type keeps release-please's stock notes.
        required: false
        type: boolean
        default: false

# Declared here as the cap; the caller job must also grant these or the token
# can't be elevated to them (effective perms are the intersection of the two).
permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Full history + tags so the back-labeling step can resolve the PREVIOUS
      # release tag by ancestry (git describe). The release commit itself is
      # already on the branch that triggered this run; we only need the depth
      # and the existing tags — not the brand-new tag, which we never rely on.
      - name: Check out full history (for previous-tag lookup)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      # release-please authors its PR and tag with a GitHub App token (passed by
      # the caller via `secrets: inherit`). This is the one supported path, not an
      # option: events created by the default GITHUB_TOKEN are suppressed by
      # GitHub's recursion guard, so required CI would never run on the release PR
      # (and tag-triggered publish jobs would never fire). If RELEASE_APP_ID /
      # RELEASE_APP_PRIVATE_KEY are missing, this step fails the run by design —
      # there is no GITHUB_TOKEN fallback to avoid divergent behavior.
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      # Two mutually-exclusive engines, selected by the `github-scoped-notes`
      # flag; exactly one runs. Both expose the same release_created / tag_name /
      # version / sha outputs, which the normalize step below funnels into a
      # single `release` id so the back-labeling step is identical either way.

      # DEFAULT engine: stock googleapis/release-please-action. Unchanged from
      # before the GitHub-scoped-notes work — this is what runs unless a caller
      # opts in.
      - name: release-please (stock action)
        if: ${{ !inputs.github-scoped-notes }}
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        id: release_stock
        with:
          token: ${{ steps.app-token.outputs.token }}
          # Manifest mode. Defaults to release-please-config.json /
          # .release-please-manifest.json at the repo root; a caller can point at
          # other files to run a second, independent release line from one repo.
          config-file: ${{ inputs.config-file }}
          manifest-file: ${{ inputs.manifest-file }}
          # Release against whichever branch triggered the caller. On main this is
          # just "main" (the default); on a release/** branch it scopes the
          # release to that maintenance line so a hotfix ships only its fix.
          target-branch: ${{ github.ref_name }}

      # OPT-IN engine: library-mode release-please (a local composite action) so
      # it can register a custom ChangelogNotes that emits GitHub-style notes
      # scoped per package path. The action exposes no hook for custom notes; the
      # library does (registerChangelogNotes). Versioning / release PR / tag /
      # Release are otherwise stock release-please.
      #
      # The release PR body and the published Release get the SAME GitHub-style
      # notes: release-please builds the PR body from our notes, and at release
      # time copies the Release body verbatim out of the merged PR body.
      #
      # Pinned at @main (action `uses:` refs must be literal). Consumers that pin
      # this reusable workflow at @main get matching scripts; a tagged pin can
      # skew from main until this is cut into the same tag.
      - name: release-please (GitHub-scoped notes)
        if: ${{ inputs.github-scoped-notes }}
        uses: OpenHands/release-actions/scripts/release-please@main
        id: release_custom
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: ${{ inputs.config-file }}
          manifest-file: ${{ inputs.manifest-file }}
          target-branch: ${{ github.ref_name }}

      # Funnel whichever engine ran into one `release` id. The skipped step's
      # outputs are empty, so `||` selects the engine that actually ran. The
      # back-labeling step below reads only `steps.release.outputs.*` and is
      # unaffected by the flag.
      - name: Normalize release outputs
        id: release
        env:
          RELEASE_CREATED: ${{ steps.release_stock.outputs.release_created || steps.release_custom.outputs.release_created }}
          TAG_NAME: ${{ steps.release_stock.outputs.tag_name || steps.release_custom.outputs.tag_name }}
          VERSION: ${{ steps.release_stock.outputs.version || steps.release_custom.outputs.version }}
          SHA: ${{ steps.release_stock.outputs.sha || steps.release_custom.outputs.sha }}
        run: |
          {
            echo "release_created=${RELEASE_CREATED}"
            echo "tag_name=${TAG_NAME}"
            echo "version=${VERSION}"
            echo "sha=${SHA}"
          } >> "$GITHUB_OUTPUT"

      # When a release is cut, go back and tag every PR that shipped in it with a
      # `released: <tag>` label (and a short comment). Not a release-please
      # feature: we derive the included PRs from the commit range
      # `<previous tag>..<release commit>`, where the previous tag is found by git
      # ancestry. If there is NO previous tag we label nothing — we never walk the
      # whole history (doing so once mass-labeled every PR ever merged).
      - name: Label included PRs with the release version
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          TAG: ${{ steps.release.outputs.tag_name }}
          VERSION: ${{ steps.release.outputs.version }}
          SHA: ${{ steps.release.outputs.sha }}
        with:
          # Same App token as release-please, so labels/comments come from one
          # identity and use one permission set.
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const tag = process.env.TAG;          // e.g. v0.1.1, or cloud-1.37.3
            const version = process.env.VERSION;  // e.g. 0.1.1, or 1.37.3
            const sha = process.env.SHA;          // commit the release was tagged at
            const { owner, repo } = context.repo;
            // Label off the TAG, not the bare version. A repo can run this
            // workflow for more than one release line (e.g. `1.7.3` and
            // `cloud-1.37.3`): their versions can collide, their tags cannot.
            const label = `released: ${tag}`;
            const tagUrl = `https://github.com/${owner}/${repo}/releases/tag/${tag}`;

            // The tag prefix for THIS release line (e.g. "v" or "cloud-"), derived
            // by stripping the version off the tag. Used to scope the previous-tag
            // lookup to the same line, so a `cloud-*` release does not pick a
            // `v*` tag (or vice versa) as its base.
            const prefix = (version && tag.endsWith(version)) ? tag.slice(0, -version.length) : '';

            // 1. Find the previous release tag by ANCESTRY: the most recent tag
            //    reachable from the release commit's first parent. We deliberately
            //    do NOT consult the releases API. That endpoint orders releases by
            //    creation time, which is wrong twice over:
            //      (a) it may not yet include the release we just cut (read-after-
            //          write lag) — the lookup then misfired as "first release ever"
            //          and mass-labeled the entire history; and
            //      (b) it is wrong for patches — a hotfix on a maintenance branch is
            //          newer by date, but its true predecessor is its branch
            //          ancestor, not whatever shipped most recently on main.
            //    git ancestry is immune to both: no network read of our own write,
            //    and it follows real history.
            const describeArgs = ['describe', '--tags', '--abbrev=0'];
            if (prefix) describeArgs.push('--match', `${prefix}*`);
            describeArgs.push(`${sha}^`);
            const describe = await exec.getExecOutput('git', describeArgs, { ignoreReturnCode: true, silent: true });
            const prevTag = describe.exitCode === 0 ? describe.stdout.trim() : '';

            // 2. No ancestor tag ⇒ STOP. We never fall back to walking the whole
            //    history: that labels every PR ever merged (the original bug). A
            //    genuine first-ever release is left unlabeled by design — label its
            //    PRs by hand if you want them — because we cannot distinguish
            //    "first release" from "tags missing / lookup failed", and only one
            //    of those is safe to act on.
            if (!prevTag) {
              core.warning(
                `No ancestor tag found for ${tag} (searched ${prefix ? `'${prefix}*'` : 'all tags'} from ${sha}^). ` +
                `Skipping back-labeling — refusing to label the entire history. ` +
                `If this is genuinely the first release, label its PRs manually.`,
              );
              return;
            }
            core.info(`Previous release tag (by ancestry): ${prevTag}`);

            // The commits in this release are exactly `${prevTag}..${sha}`:
            // reachable from the release commit, not from the previous tag.
            const revList = await exec.getExecOutput('git', ['rev-list', `${prevTag}..${sha}`], { silent: true });
            const shas = revList.stdout.split('\n').map(s => s.trim()).filter(Boolean);

            // 3. Map those commits to the merged PRs that introduced them.
            const prNumbers = new Set();
            for (const commit_sha of shas) {
              const assoc = await github.rest.repos.listPullRequestsAssociatedWithCommit({ owner, repo, commit_sha });
              for (const pr of assoc.data) {
                if (pr.merged_at) prNumbers.add(pr.number);
              }
            }

            // 4. Ensure the version label exists (create on first use).
            try {
              await github.rest.issues.getLabel({ owner, repo, name: label });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({ owner, repo, name: label, color: '1D76DB', description: `Shipped in ${tag}` });
              } else { throw e; }
            }

            // 5. Tag each included PR, skipping release-please's own release PR.
            let tagged = 0;
            for (const number of prNumbers) {
              const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: number });
              const isReleasePR = pr.head.ref.startsWith('release-please--') ||
                                  pr.labels.some(l => l.name.startsWith('autorelease:'));
              if (isReleasePR) continue;
              await github.rest.issues.addLabels({ owner, repo, issue_number: number, labels: [label] });
              await github.rest.issues.createComment({ owner, repo, issue_number: number, body: `🚀 Released in [${tag}](${tagUrl}).` });
              core.info(`Tagged PR #${number} with "${label}".`);
              tagged++;
            }
            core.info(`Tagged ${tagged} PR(s) as shipped in ${tag}.`);
