name: pr-title (reusable)

# Reusable workflow: lints a PR title for Conventional Commits format and applies
# a matching `type: <type>` label (which drives release-notes grouping via
# .github/release.yml).
#
# SECURITY MODEL — this is designed to run under pull_request_target (so it
# works on PRs from forks / non-members), which means it executes with a
# writable token in the base repo's context. It stays safe because:
#   * It NEVER checks out or runs any code from the PR. It only reads the PR
#     title out of the event payload — so fork code never runs here.
#   * It uses ONLY the default GITHUB_TOKEN, never the release App token. The
#     caller must NOT pass `secrets: inherit`, so the App credentials are not
#     even in scope. Both steps below pin the token to secrets.GITHUB_TOKEN.
#   * The title is read as runtime data (context.payload), never interpolated
#     into the script as an Actions expression, so a crafted title can't inject.
#
# Carries no trigger of its own. The consumer repo owns it in a thin caller
# workflow:
#
#   on:
#     pull_request_target:
#       types: [opened, edited, reopened]
#   jobs:
#     pr-title:
#       permissions: { pull-requests: write }
#       # do NOT add `secrets: inherit` — keep the App token out of scope
#       uses: OpenHands/release-actions/.github/workflows/pr-title.yml@main
#
# (This repo calls it via the local `./` path — see .github/workflows/pr.yml.)
on:
  workflow_call:

# Cap for the called token; the caller job must also grant pull-requests: write.
permissions:
  pull-requests: write

jobs:
  lint:
    name: Lint PR title (conventional)
    runs-on: ubuntu-latest
    steps:
      # GITHUB_TOKEN only — never the App token. This action reads the title
      # from the event payload and needs no checkout, so it's safe under
      # pull_request_target.
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            docs
            chore
            build
            ci
            refactor
            style
            test
            revert

  label:
    name: Apply conventional-type label
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          # GITHUB_TOKEN only — pinned explicitly so this can never silently
          # pick up the release App token, even if a caller later (wrongly)
          # added `secrets: inherit`.
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const TYPE_LABELS = {
              feat:     { color: '0E8A16', description: 'A new feature' },
              fix:      { color: 'D73A4A', description: 'A bug fix' },
              perf:     { color: '5319E7', description: 'A performance improvement' },
              docs:     { color: '0075CA', description: 'Documentation only changes' },
              chore:    { color: 'FEF2C0', description: 'Maintenance / chores' },
              build:    { color: 'C2E0C6', description: 'Build system or dependencies' },
              ci:       { color: 'BFDADC', description: 'CI configuration changes' },
              refactor: { color: 'FBCA04', description: 'Code refactoring' },
              style:    { color: 'CCCCCC', description: 'Formatting / style only' },
              test:     { color: 'D4C5F9', description: 'Adding or fixing tests' },
              revert:   { color: 'E99695', description: 'Reverts a previous commit' },
            };

            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;
            const number = pr.number;

            // SAFETY: the title is read here as plain runtime data from the event
            // payload — it is NEVER interpolated into this script as an Actions
            // expression, so it cannot inject code, even under pull_request_target.
            // Treat it as hostile input and validate strictly before any API call.
            const title = typeof pr.title === 'string' ? pr.title : '';

            // Parse the conventional type from the FRONT of the title only:
            // <type>, optional (scope), optional !, then ':'. \w+ admits no shell
            // or JS metacharacters, and the captured type must then be an OWN key
            // of the allowlist below — so nothing attacker-controlled (including
            // prototype keys like "__proto__"/"constructor") reaches a label name.
            const match = title.match(/^(\w+)(?:\([^)]*\))?(!)?:/);
            if (!match) { core.setFailed(`PR title not conventional: "${title}"`); return; }
            const type = match[1].toLowerCase();
            if (!Object.prototype.hasOwnProperty.call(TYPE_LABELS, type)) {
              core.setFailed(`Unknown type "${type}"`); return;
            }
            const desired = `type: ${type}`;

            // Ensure the label exists (create on first use).
            try {
              await github.rest.issues.getLabel({ owner, repo, name: desired });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner, repo, name: desired,
                  color: TYPE_LABELS[type].color,
                  description: TYPE_LABELS[type].description,
                });
              } else { throw e; }
            }

            // Swap out any stale managed type-labels (handles edited titles).
            const managed = new Set(Object.keys(TYPE_LABELS).map(t => `type: ${t}`));
            const current = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number: number });
            for (const label of current.data) {
              if (managed.has(label.name) && label.name !== desired) {
                await github.rest.issues.removeLabel({ owner, repo, issue_number: number, name: label.name });
              }
            }

            // Apply the current type label (idempotent).
            await github.rest.issues.addLabels({ owner, repo, issue_number: number, labels: [desired] });
            core.info(`Applied "${desired}" to PR #${number}.`);
