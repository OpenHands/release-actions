name: release ready

# Caller: on ready-for-review, delegate to the reusable release-ready workflow
# (labels the release PR + notifies Slack). The trigger lives here because
# ready_for_review fires in the repo that owns the release PR. Safe under
# pull_request_target — release-ready.yml never checks out or runs PR code, so
# do NOT add a checkout step.
on:
  pull_request_target:
    types: [ready_for_review]

jobs:
  release-ready:
    permissions:
      actions: read # write only if `release-test-workflows` is set
      contents: read # write only if `release-test-event-type` is set
      issues: write
      pull-requests: write
    secrets: inherit # RELEASE_APP_* + SLACK_BOT_TOKEN
    uses: ./.github/workflows/release-ready.yml
    with:
      product-name: Release Actions
      slack-channel: "#proj-agent-canvas"
      ready-labels: integration-tests
