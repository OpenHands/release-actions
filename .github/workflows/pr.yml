name: pr

# Caller workflow: dogfoods this repo's own reusable PR-title workflow.
# A consumer repo would have an identical file, but with `uses:` pointing at
# this repo by tag instead of the local `./` path.
on:
  pull_request:
    # synchronize is needed alongside the title events: required status checks
    # attach to a head SHA, and release-please force-pushes new commits to its
    # release PR, so the lint must re-run on each update to stay green.
    types: [opened, edited, reopened, synchronize]

jobs:
  pr-title:
    permissions:
      pull-requests: write
    uses: ./.github/workflows/pr-title.yml
